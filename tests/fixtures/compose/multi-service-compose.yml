services:
  web:
    image: myorg/web:2.3.1
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://db:5432/app

  db:
    image: postgres:16.2
    environment:
      POSTGRES_PASSWORD: hunter2literalsecret
      POSTGRES_DB: app
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7.2

volumes:
  db-data: {}
